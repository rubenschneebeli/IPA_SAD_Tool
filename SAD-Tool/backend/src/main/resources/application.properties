spring.application.name=sad-tool

# DB Config (Werte kommen aus Umgebungsvariablen, Fallback fuer lokale Entwicklung)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:saddb}
spring.datasource.username=${DB_USER:user}
spring.datasource.password=${DB_PASSWORD:password}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Port
server.port=8080

# Mock User
app.mock-user.username=${MOCK_USERNAME:admin}
app.mock-user.password=${MOCK_PASSWORD:password}
